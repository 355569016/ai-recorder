window.onerror = function(message, source, lineno, colno, error) {
  var target = document.getElementById("phone");
  if (target) {
    target.innerHTML = "<div style=\"padding:24px;font-family:sans-serif\"><h2>浏览器端脚本错误</h2><p>" + String(message) + "</p><p>" + lineno + ":" + colno + "</p></div>";
  }
  var spec = document.getElementById("specBody");
  if (spec) {
    spec.textContent = error && error.stack ? error.stack : String(message);
  }
};

function h(text) {
  return String(text ?? "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function isValidEmail(value) {

function pageById(id) {
  return pages.find((page) => page.id === id) || pages[0];

function clearFirmwareUpdateTimer() {
  if (!firmwareUpdateTimer) return;
  window.clearTimeout(firmwareUpdateTimer);
  firmwareUpdateTimer = null;
}

function scheduleFirmwareUpdateStep(callback, delay = 3000) {
  clearFirmwareUpdateTimer();
  firmwareUpdateTimer = window.setTimeout(() => {
    firmwareUpdateTimer = null;
    if (currentPageId !== "APP-DEV-08") return;
    callback();
  }, delay);
}

function beginFirmwareTransfer() {
  firmwareUpdateStep = "transfer";
  firmwareJoinPromptOpen = false;
  render();
  scheduleFirmwareUpdateStep(() => {
    if (firmwareUpdateStep !== "transfer") return;
    firmwareUpdateStep = "install";
    render();
  });
}

function beginFirmwareUpdateFlow() {
  clearFirmwareUpdateTimer();
  firmwareUpdateStep = "download";
  firmwareJoinPromptOpen = false;
  scheduleFirmwareUpdateStep(() => {
    if (firmwareUpdateStep !== "download") return;
    firmwareUpdateStep = "connect";
    if (firmwareUpdateTransport === "wifi") {
      firmwareJoinPromptOpen = true;
      render();
      return;
    }
    render();
    scheduleFirmwareUpdateStep(() => {
      if (firmwareUpdateStep !== "connect") return;
      beginFirmwareTransfer();
    });
  });
}

function resumeFirmwareUpdateAtConnection() {
  clearFirmwareUpdateTimer();
  firmwareUpdateStep = "connect";
  firmwareJoinPromptOpen = firmwareUpdateTransport === "wifi";
  if (firmwareUpdateTransport === "bluetooth") {
    scheduleFirmwareUpdateStep(() => {
      if (firmwareUpdateStep !== "connect") return;
      beginFirmwareTransfer();
    });
  }
}

function homeSyncStats() {
  const total = homeSyncQueue.length;
  const completed = homeSyncQueue.filter((task) => task.status === "completed").length;
  const totalBytes = homeSyncQueue.reduce((sum, task) => sum + task.size, 0);
  const transferredBytes = homeSyncQueue.reduce((sum, task) => sum + Math.min(task.transferred, task.size), 0);
  const percent = totalBytes ? Math.round((transferredBytes / totalBytes) * 100) : 0;
  const remainingBytes = Math.max(0, totalBytes - transferredBytes);
  const speed = homeSyncTransport === "lan" ? 4 : homeSyncTransport === "hotspot" ? 2 : .45;
  const remainingMinutes = Math.max(1, Math.ceil((remainingBytes / speed) / 60));
  return { total, completed, totalBytes, transferredBytes, percent, remainingBytes, remainingMinutes };
}

function homeSyncTaskPercent(task) {
  return task.size ? Math.round((Math.min(task.transferred, task.size) / task.size) * 100) : 0;
}

function orderedHomeSyncQueue() {
  return [
    ...homeSyncQueue.filter((task) => task.status === "syncing"),
    ...homeSyncQueue.filter((task) => task.status === "pending"),
    ...homeSyncQueue.filter((task) => task.status === "completed")
  ];
}

function renderHomeSyncModule(stage = homeSyncStage) {
  const transportViews = {
    ble: { label: "蓝牙", tone: "ble" },
    lan: { label: "局域网", tone: "lan" },
    hotspot: { label: "录音卡热点", tone: "hotspot" }
  };
  if (!homeSyncQueue.length || !["finishing", "saved"].includes(stage)) return "";
  const stats = homeSyncStats();
  const multipleTasks = stats.total > 1;
  const allCompleted = stats.completed === stats.total;
  const transport = transportViews[homeSyncTransport] || transportViews.ble;
  const title = allCompleted || stage === "saved" ? "同步完成" : "同步中";
  const remainingText = allCompleted ? "已保存到手机" : `预计 ${stats.remainingMinutes} 分钟`;
  const mainTag = multipleTasks ? "button" : "div";
  const mainAction = multipleTasks ? ' data-action="open-home-sync-queue" aria-label="打开本次同步队列"' : ' aria-label="当前同步任务"';
  return `
    <section class="sync-mini ${allCompleted ? "saved" : "finishing"}" aria-label="当前同步状态">
      <${mainTag} class="sync-mini-main"${mainAction}>
        <strong>${h(title)}</strong>
        <i class="sync-transport-badge ${transport.tone}">${h(transport.label)}</i>
        <b>${stats.percent}%</b>
        ${multipleTasks ? `<em class="sync-mini-count">${stats.completed}/${stats.total}</em>` : ""}
        <span>${h(remainingText)}</span>
        ${multipleTasks ? '<em class="sync-mini-queue">队列 ›</em>' : ""}
      </${mainTag}>
      <button class="sync-mini-switch" data-action="open-home-sync-methods">切换</button>
      <div class="sync-mini-progress" aria-hidden="true"><b style="width:${stats.percent}%"></b></div>
    </section>
  `;
}

    <div class="home-sync-sheet-heading">
      <span><small>本次同步队列 · 批次 ${homeSyncBatchSerial}</small><strong>${stats.completed}/${stats.total} 已完成 · 整体 ${stats.percent}%</strong></span>
      <button data-action="close-home-sync-panel" aria-label="关闭">×</button>
    </div>
    <div class="home-sync-queue-list" aria-label="本次同步任务">
      ${queueItems.map((task) => {
        const taskPercent = homeSyncTaskPercent(task);
        const stateText = task.status === "completed"
          ? "同步完成"
          : task.status === "syncing"
            ? "正在同步"

              <b>${taskPercent}%</b>
              ${showPriority && task.status === "pending" ? `<button data-action="prioritize-home-sync-task" data-task-id="${h(task.id)}">${homeSyncPriorityTaskId === task.id ? "已优先" : "优先同步"}</button>` : `<em>${h(stateText)}</em>`}

    </div>
    <div class="home-sync-method-list">
      ${[["ble", "蓝牙", "低打扰，适合小文件"], ["lan", "局域网", "保持手机联网，高速传输"], ["hotspot", "录音卡热点", "网络不可用时使用"]].map(([value, label, note]) => `
        <button class="${homeSyncTransport === value ? "active" : ""}" data-action="set-sync-transport" data-value="${value}">
          <span><b>${label}</b><small>${note}</small></span><i>${homeSyncTransport === value ? "当前" : "切换"}</i>
        </button>
      `).join("")}
    </div>
  `;
  return `
    <div class="scrim subtle home-sync-scrim" data-action="close-home-sync-panel"></div>
    <section class="bottom-sheet home-sync-sheet" role="dialog" aria-modal="true">${body}</section>
  `;
}

function prioritizeHomeSyncTask(taskId) {
  if (homeSyncQueue.length <= 3) return;
  const taskIndex = homeSyncQueue.findIndex((task) => task.id === taskId && task.status === "pending");
  if (taskIndex < 0) return;
  const [task] = homeSyncQueue.splice(taskIndex, 1);
  const activeIndex = homeSyncQueue.findIndex((item) => item.status === "syncing");
  homeSyncQueue.splice(activeIndex >= 0 ? activeIndex + 1 : 0, 0, task);
  homeSyncPriorityTaskId = task.id;
}

function completeCurrentHomeSyncTask() {
  const activeTask = homeSyncQueue.find((task) => task.status === "syncing");
  if (!activeTask) return;
  activeTask.status = "completed";
  activeTask.transferred = activeTask.size;
  if (homeSyncPriorityTaskId === activeTask.id) homeSyncPriorityTaskId = "";
  const nextTask = homeSyncQueue.find((task) => task.status === "pending");
  if (nextTask) {
    nextTask.status = "syncing";
    homeSyncStage = "finishing";
  } else {
    homeSyncStage = "saved";
    homeSyncPriorityTaskId = "";
  }
}

function startSingleHomeSyncBatch() {
  homeSyncBatchSerial += 1;
  homeSyncQueue = [{ id: `sync-new-${homeSyncBatchSerial}`, title: "New field interview", size: 22, transferred: 7.6, status: "syncing" }];
  homeSyncPriorityTaskId = "";
  homeSyncStage = "finishing";
  homeSyncPanel = "";
}

function resetMultiHomeSyncBatch() {

}

function startResetPasswordCountdown() {
  if (resetPasswordTimer) window.clearInterval(resetPasswordTimer);
  resetPasswordCountdown = 60;
  resetPasswordTimer = window.setInterval(() => {
    resetPasswordCountdown = Math.max(0, resetPasswordCountdown - 1);
    const resendButton = document.querySelector("[data-action='resend-reset-code']");
    if (resendButton) {
      resendButton.textContent = resetPasswordCountdown > 0 ? `重新发送 ${resetPasswordCountdown}` : "重新发送验证码";
      resendButton.disabled = resetPasswordCountdown > 0;
    }
    if (resetPasswordCountdown === 0) {
      window.clearInterval(resetPasswordTimer);
      resetPasswordTimer = null;
    }
  }, 1000);
}

function nextRecordingMarkTime() {
  const offset = Math.max(0, recordingMarks.length - recordingBaseMarks.length);
  return `00:${String(38 + offset).padStart(2, "0")}:${String(12 + offset * 7).padStart(2, "0")}`;
}

function addRecordingMark(type) {
  const index = recordingMarks.length + 1;
  const markMeta = {
    input: { text: `备注标记 #${index} · App 输入` },
    photo: { text: `照片标记 #${index} · 手机拍照` },
    mark: { text: `重点标记 #${index} · App 标记` }
  };
  const meta = markMeta[type] || markMeta.mark;
  recordingMarks = [...recordingMarks, { time: nextRecordingMarkTime(), type, text: meta.text }];
  recordingCameraPrompt = type === "photo";
}

function renderRecordingMarks() {
  return recordingMarks.map((mark) => `
    <div class="timeline-item ${mark.type === "photo" ? "photo-marker" : ""} ${mark.type === "input" ? "input-marker" : ""}">
      <strong>${h(mark.time)}${mark.type === "photo" ? ' <i class="timeline-photo-icon" aria-label="照片标记"></i>' : ""}</strong><br>
      <span>${h(mark.text)}</span>
    </div>
  `).join("");
}

function localDateKey(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function recordingMinutesForDate(date, index) {
  const seed = (date.getFullYear() * 17 + (date.getMonth() + 1) * 31 + date.getDate() * 13 + index) % 29;
  if (seed < 16) return 0;
  if (seed < 21) return 8 + (seed * 3) % 18;
  if (seed < 26) return 31 + (seed * 7) % 54;
  return 96 + (seed * 11) % 88;
}

function heatmapDots() {
  const daysPerWeek = 7;
  const weekCount = 53;
  const totalDays = daysPerWeek * weekCount;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const start = new Date(today);
  start.setDate(today.getDate() - totalDays + 1);
  const cells = [];

  for (let index = 0; index < totalDays; index += 1) {
    const date = new Date(start);
    date.setDate(start.getDate() + index);
    const dateKey = localDateKey(date);
    const minutes = recordingMinutesForDate(date, index);
    const level = minutes === 0 ? 0 : Math.min(4, Math.ceil(minutes / 45));
    const label = `${dateKey} · 录音卡实际录音 ${minutes} 分钟`;
    cells.push(`<i class="level-${level}" role="gridcell" aria-rowindex="${index % daysPerWeek + 1}" aria-colindex="${Math.floor(index / daysPerWeek) + 1}" aria-label="${label}" title="${label}" data-date="${dateKey}" data-recording-minutes="${minutes}"></i>`);
  }

  const monthSpans = [];
  let lastMonth = -1;
  const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
  for (let w = 0; w < weekCount; w += 1) {
    const day = new Date(start);
    day.setDate(start.getDate() + w * daysPerWeek);
    const m = day.getMonth();
    if (m !== lastMonth) {
      monthSpans.push(`<span style="grid-column: ${w + 1} / span 4;">${monthNames[m]}</span>`);
      lastMonth = m;
    }
  }

  return `
    <section class="settings-week-heatmap" aria-label="录音卡实际录音使用热力图">
      <div class="settings-week-heatmap-scroll" data-visible-days="180" tabindex="0" aria-label="录音使用热力图，可横向滚动查看更早日期">
        <div class="settings-week-heatmap-container" style="--settings-week-count:${weekCount}">
          <div class="settings-week-heatmap-grid" role="grid" aria-rowcount="7" aria-colcount="${weekCount}">${cells.join("")}</div>
          <div class="settings-week-heatmap-months" aria-hidden="true">${monthSpans.join("")}</div>
        </div>
      </div>
    </section>
  `;
}

function termGroupLabel(term) {
  const first = String(term || "").trim().charAt(0);
  return /^[A-Za-z]$/.test(first) ? first.toUpperCase() : "#";
}

function renderTermRows() {
  const groups = customTerms.reduce((acc, term, index) => {
    const key = termGroupLabel(term);
    if (!acc[key]) acc[key] = [];
    acc[key].push([term, index]);
    return acc;
  }, {});
  return Object.keys(groups).sort().map((key) => `
    <section class="terms-alpha-group">
      <h2>${h(key)}</h2>
      ${groups[key].map(([term, index]) => `
        <button class="terms-list-row" data-action="open-edit-term" data-term-index="${index}">
          <span>${h(term)}</span>
          <i>›</i>
        </button>
      `).join("")}
    </section>
  `).join("");
}

  return `

}

function handleSettingsAction(action, target) {
  if (action === "toggle-readability") {
    settingsState.improveReadability = !settingsState.improveReadability;
    render();
    return true;
  }
  if (action === "dismiss-settings-notice") {
    settingsNotice = "";
    render();
    return true;
  }
  if (action === "confirm-readability") {
    settingsState.improveReadability = true;
    settingsNotice = "";
    render();
    return true;
  }
  if (action === "toggle-improve-ai") {
    settingsState.improveAi = !settingsState.improveAi;
    render();
    return true;
  }
  if (action === "select-language") {
    settingsState.transcriptionLanguage = target.dataset.value;
    go("APP-ME-26");
    return true;
  }
  if (action === "toggle-speaker-diarization") {
    settingsState.speakerDiarization = !settingsState.speakerDiarization;
    render();
    return true;
  }
  if (action === "choose-speaker-name") {
    settingsState.speakerName = target.dataset.value || "我（用户名称）";
    render();
    return true;
  }
  if (action === "continue-speaker-name") {
    const value = document.getElementById("speakerNameInput")?.value.trim();
    settingsState.speakerName = value || "我（用户名称）";
    go("APP-ME-31");
    return true;
  }
  if (action === "allow-microphone") {
    settingsState.microphoneAllowed = true;
    settingsState.voiceRecording = false;
    go("APP-ME-32");
    return true;
  }
  if (action === "toggle-voice-recording") {
    if (!settingsState.voiceRecording) {
      settingsState.voiceRecording = true;
      render();
    } else {
      settingsState.voiceRecording = false;
      settingsState.voiceSampleCreated = true;
      go("APP-ME-33");
    }
    return true;
  }
  if (action === "toggle-custom-terms") {
    if (settingsState.customTermsEnabled) {
      settingsState.customTermsEnabled = false;
    } else if (!settingsState.industry && customTerms.length === 0) {
      pendingTermsEnableNotice = true;
    } else {
      settingsState.customTermsEnabled = true;
    }
    render();
    return true;
  }
  if (action === "dismiss-terms-enable-notice") {
    pendingTermsEnableNotice = false;
    render();
    return true;
  }
  if (action === "open-term-sheet") {
    termEditorIndex = null;
    termSheetMode = "add";
    termSheetError = "";
    render();
    return true;
  }
  if (action === "open-edit-term") {
    termEditorIndex = Number(target.dataset.termIndex);
    termSheetMode = "edit";
    termSheetError = "";
    render();
    return true;
  }
  if (action === "close-term-sheet") {
    termSheetMode = "";
    termEditorIndex = null;
    termSheetError = "";
    render();
    return true;
  }
  if (action === "clear-term-draft") {
    const input = document.getElementById("termSheetInput");
    if (input) {
      input.value = "";
      input.focus();
    }
    termSheetError = "";
    return true;
  }
  if (action === "delete-term-sheet") {
    if (termEditorIndex !== null) customTerms.splice(termEditorIndex, 1);
    termEditorIndex = null;
    termSheetMode = "";
    termSheetError = "";
    if (!settingsState.industry && customTerms.length === 0) settingsState.customTermsEnabled = false;
    render();
    return true;
  }
  if (action === "select-industry") {
    settingsState.industry = target.dataset.value || "";
    if (!settingsState.industry && customTerms.length === 0) settingsState.customTermsEnabled = false;
    pendingTermsEnableNotice = false;
    go("APP-ME-34");
    return true;
  }
  if (action === "save-term-sheet") {
    const value = document.getElementById("termSheetInput")?.value.trim() || "";
    if (!value) {
      termSheetError = "请输入术语";
      render();
      return true;
    }
    if (termSheetMode === "edit" && termEditorIndex !== null) {
      customTerms[termEditorIndex] = value;
    } else {
      if (!customTerms.includes(value)) customTerms.push(value);
    }
    termEditorIndex = null;
    termSheetMode = "";
    termSheetError = "";
    pendingTermsEnableNotice = false;
    render();
    return true;
  }
  if (action === "toggle-notification") {
    const key = target.dataset.notification;
    if (key in settingsState.notifications) settingsState.notifications[key] = !settingsState.notifications[key];
    render();
    return true;
  }
  if (action === "toggle-notifications-allowed") {
    settingsState.notificationsAllowed = !settingsState.notificationsAllowed;
    render();
    return true;
  }
  if (action === "toggle-app-lock") {
    if (settingsState.appLockEnabled) {
      settingsState.appLockEnabled = false;
      render();
    } else {
      go("APP-ME-40");
    }
    return true;
  }
  if (action === "select-auto-lock-inline") {
    settingsState.autoLockDuration = target.dataset.value;
    render();
    return true;
  }
  if (action === "allow-face-id") {
    settingsState.faceIdAllowed = true;
    settingsState.appLockEnabled = true;
    go("APP-ME-38");
    return true;
  }
  if (action === "select-auto-lock") {
    settingsState.autoLockDuration = target.dataset.value;
    go("APP-ME-38");
    return true;
  }
  return false;
}

function render() {
  const page = pageById(currentPageId);
  document.body.classList.toggle("document-mode", page.id === "APP-PRD-00");
  document.getElementById("screenTitle").textContent = `${page.id} ${page.title}`;
  document.getElementById("screenGoal").textContent = page.goal;
  document.getElementById("phone").innerHTML = (renderers[page.id] || renderHome)();

  if (heatmapScroller) {
    requestAnimationFrame(() => {
      heatmapScroller.scrollLeft = heatmapScroller.scrollWidth;
    });
  }
  renderNav();
  renderFlow();
  renderPrototypeLinks(page);
  renderSpec(page);
}

document.addEventListener("click", (event) => {
  const askInput = event.target.closest(".note-question-bar");
  if (askInput) {
    askPlaudMode = "intro";
    render();
    return;
  }
  const tab = event.target.closest("[data-tab]");
  if (tab) {
    fileDetailTab = tab.dataset.tab;
    render();
    return;
  }
  const mode = event.target.closest("[data-mode]");
  if (mode) {
    generationMode = mode.dataset.mode;
    render();
    return;
  }
  const action = event.target.closest("[data-action]");
  if (action && action.dataset.action === "toggle-register-password") {
    registerPasswordVisible = !registerPasswordVisible;
    render();
    requestAnimationFrame(() => document.getElementById("registerPassword")?.focus());
    return;
  }
  if (action && action.dataset.action === "toggle-register-agreement") {
    registerAgreementAccepted = !registerAgreementAccepted;
    if (registerNoticeTone === "error") {
      registerNotice = "";
      registerNoticeTone = "";
    }
    render();
    return;
  }
  if (action && action.dataset.action === "toggle-register-marketing") {
    registerMarketingOptIn = !registerMarketingOptIn;
    render();
    return;
  }
  if (action && action.dataset.action === "submit-register") {
    registerEmail = document.getElementById("registerEmail")?.value.trim().toLowerCase() || "";
    registerPassword = document.getElementById("registerPassword")?.value || "";
    if (!isValidEmail(registerEmail)) {
      registerNotice = "请输入有效的邮箱地址。";
      registerNoticeTone = "error";
      render();
      requestAnimationFrame(() => document.getElementById("registerEmail")?.focus());
      return;
    }
    if (registerPassword.length < 8) {
      registerNotice = "密码至少需要 8 位。";
      registerNoticeTone = "error";
      render();
      requestAnimationFrame(() => document.getElementById("registerPassword")?.focus());
      return;
    }
    if (!registerAgreementAccepted) {
      registerNotice = "请先同意用户协议和隐私政策。";
      registerNoticeTone = "error";
      render();
      return;
    }
    registerNotice = "";
    registerNoticeTone = "";
    registerCode = "";
    registerCodeNotice = "";
    registerCodeNoticeTone = "";
    startRegisterCodeCountdown();
    go("APP-ONB-03");
    requestAnimationFrame(() => document.querySelector(".register-code-digit")?.focus());
    return;
  }
  if (action && action.dataset.action === "resend-register-code") {
    if (registerCodeCountdown > 0) return;
    registerCode = "";
    registerCodeNotice = "验证码已重新发送。";
    registerCodeNoticeTone = "success";
    startRegisterCodeCountdown();
    render();
    requestAnimationFrame(() => document.querySelector(".register-code-digit")?.focus());
    return;

      document.querySelector(".change-password-page .auth-notice")?.remove();
    }
    const button = document.querySelector("[data-action='submit-change-password']");
    const canSubmit = Boolean(changePasswordCurrent && changePasswordNew && changePasswordConfirm);
    if (button) {
      button.disabled = !canSubmit;
      button.classList.toggle("disabled", !canSubmit);
    }
  }
  if (event.target.id === "loginEmail" || event.target.id === "loginPassword") {
    loginEmail = document.getElementById("loginEmail")?.value || "";
    loginPassword = document.getElementById("loginPassword")?.value || "";
    if (loginNoticeTone === "error") {
      loginNotice = "";
      loginNoticeTone = "";
      document.querySelector(".auth-notice")?.remove();
    }
    const button = document.querySelector("[data-action='login-with-password']");
    const canLogin = Boolean(loginEmail.trim() && loginPassword);
    if (button) {
      button.disabled = !canLogin;
      button.classList.toggle("disabled", !canLogin);
    }
  }
  if (event.target.id === "resetPasswordEmail" || event.target.id === "resetPasswordValue") {
    resetPasswordEmail = document.getElementById("resetPasswordEmail")?.value || "";
    resetPasswordValue = document.getElementById("resetPasswordValue")?.value || "";
    if (resetPasswordNoticeTone === "error") {
      resetPasswordNotice = "";
      resetPasswordNoticeTone = "";
      document.querySelector(".auth-screen .auth-notice")?.remove();
    }
    const button = document.querySelector("[data-action='submit-reset-password']");
    const canContinue = Boolean(resetPasswordEmail.trim() && resetPasswordValue);
    if (button) {
      button.disabled = !canContinue;
      button.classList.toggle("disabled", !canContinue);
    }
  }
  if (event.target.matches(".reset-code-digit")) {
    clearResetPasswordCodeError();
    event.target.value = event.target.value.replace(/\D/g, "").slice(-1);
    const inputs = [...document.querySelectorAll(".reset-code-digit")];
    resetPasswordCode = inputs.map((input) => input.value).join("");
    if (event.target.value) inputs[Number(event.target.dataset.codeIndex) + 1]?.focus();
    const button = document.querySelector("[data-action='confirm-reset-password']");
    const canConfirm = resetPasswordCodeSent && Boolean(resetPasswordValue) && resetPasswordCode.length === 6;
    if (button) {
      button.disabled = !canConfirm;
      button.classList.toggle("disabled", !canConfirm);
    }
  }
  if (event.target.id === "currentWifiPassword") {
    currentWifiPassword = event.target.value;
    const connectButton = document.getElementById("currentWifiConnectButton");
    if (connectButton) {
      const hasPassword = Boolean(currentWifiPassword.trim());
      connectButton.disabled = !hasPassword;
      connectButton.classList.toggle("disabled", !hasPassword);
    }
  }
  if (event.target.id === "deletePassword") {
    deleteAccountPassword = event.target.value;
    deleteAccountConfirmNotice = "";
    deleteAccountConfirmNoticeTone = "";
  }
  if (event.target.id === "deleteCode") {
    deleteAccountCode = event.target.value.replace(/\D/g, "").slice(0, 6);
    event.target.value = deleteAccountCode;
    deleteAccountConfirmNotice = "";
    deleteAccountConfirmNoticeTone = "";
  }
  if (event.target.id === "deletePassword" || event.target.id === "deleteCode") {
    const canDelete = deleteAccountConfirmMode === "password"
      ? deleteAccountPassword.trim().length > 0
      : deleteAccountCodeSent && deleteAccountCode.length === 6;
    const button = document.querySelector("[data-action='confirm-delete-account']");
    if (button) button.disabled = !canDelete;
  }
});

document.addEventListener("keydown", (event) => {
  if (!event.target.matches(".reset-code-digit, .register-code-digit") || event.key !== "Backspace" || event.target.value) return;
  const index = Number(event.target.dataset.codeIndex);
  const selector = event.target.matches(".register-code-digit") ? ".register-code-digit" : ".reset-code-digit";
  document.querySelector(`${selector}[data-code-index='${index - 1}']`)?.focus();
});

document.addEventListener("paste", (event) => {
  if (!event.target.matches(".reset-code-digit, .register-code-digit")) return;
  const pastedCode = event.clipboardData?.getData("text").replace(/\D/g, "").slice(0, 6) || "";
  if (!pastedCode) return;
  event.preventDefault();
  const isRegisterCode = event.target.matches(".register-code-digit");
  if (!isRegisterCode) clearResetPasswordCodeError();
  const selector = isRegisterCode ? ".register-code-digit" : ".reset-code-digit";
  const inputs = [...document.querySelectorAll(selector)];
  inputs.forEach((input, index) => {
    input.value = pastedCode[index] || "";
  });
  if (isRegisterCode) {
    registerCode = pastedCode;
    registerCodeNotice = "";
    registerCodeNoticeTone = "";
  } else {
    resetPasswordCode = pastedCode;
  }
  inputs[Math.min(pastedCode.length, 5)]?.focus();
  const button = document.querySelector(isRegisterCode ? "[data-action='confirm-register-code']" : "[data-action='confirm-reset-password']");
  if (button) {
    const canConfirm = isRegisterCode
      ? pastedCode.length === 6
      : resetPasswordCodeSent && Boolean(resetPasswordValue) && pastedCode.length === 6;
    button.disabled = !canConfirm;
    button.classList.toggle("disabled", !canConfirm);
  }
});

document.addEventListener("submit", (event) => {
  const filterFolderForm = event.target.closest("[data-action='save-filter-folder']");
  if (filterFolderForm) {
    event.preventDefault();
    const name = filterFolderForm.querySelector("#filterFolderName")?.value.trim();
    if (!name) {
      filterFolderError = "请输入文件夹名称";
      render();
      return;
    }
    const duplicate = filterFolders.some((folder) => folder.name === name && folder.id !== activeFilterFolderId);
    if (duplicate) {
      filterFolderError = "已存在同名文件夹";
      render();
      return;
    }
    if (filterFolderSheetMode === "rename" && activeFilterFolderId) {
      filterFolders = filterFolders.map((folder) => folder.id === activeFilterFolderId ? { ...folder, name } : folder);
    } else {
      filterFolders = [
        ...filterFolders,
        { id: `filter-folder-${Date.now()}`, name, count: 0, tone: filterFolders.length % 2 ? "blue" : "" }
      ];
    }
    filterFolderSheetMode = "";
    activeFilterFolderId = "";
    pendingDeleteFilterFolderId = "";
    filterFolderError = "";
    render();
    return;
  }
  const folderForm = event.target.closest("[data-action='save-new-folder']");
  if (folderForm) {
    event.preventDefault();
    const name = folderForm.querySelector("#newFolderName")?.value.trim();
    if (!name) return;
    const folder = {
      id: `custom-${Date.now()}`,
      name,
      count: 0,
      tone: moveFolderFolders.length % 2 ? "blue" : ""
    };
    moveFolderFolders = [...moveFolderFolders, folder];
    selectedMoveFolderId = folder.id;
    moveFolderCreateOpen = false;
    render();
    return;
  }
  const form = event.target.closest("[data-action='ask-submit']");
  if (!form) return;
  event.preventDefault();
  if (askPlaudMode === "thinking") {
    askPlaudMode = "answer";
  } else {
    askPlaudPrompt = form.querySelector("#askPlaudInput")?.value.trim() || askPlaudPrompt || askPlaudSuggestions[0];
    askPlaudMode = "thinking";
  }
  render();
});

if (currentPageId === "APP-DEV-08") {
  beginFirmwareUpdateFlow();
}

try {
  render();
} catch (error) {
  const target = document.getElementById("phone");
  if (target) {
    target.innerHTML = `<div style="padding:24px;font-family:sans-serif"><h2>原型渲染错误</h2><p>${h(error.message)}</p></div>`;
  }
  const spec = document.getElementById("specBody");
  if (spec) {
    spec.innerHTML = `<pre style="white-space:pre-wrap;color:#b13b2d">${h(error.stack || error.message)}</pre>`;
  }
  throw error;
}

  </script>
</body>
